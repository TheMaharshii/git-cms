<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Git-CMS | Schema Studio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <div class="brand-row">
        <img src="assets/logo.svg" alt="Git-CMS Logo" class="brand-logo" width="44" height="44">
        <div>
          <h1>Schema Studio</h1>
          <p class="header-subtitle">Infer schema and validate datasets for structural drift</p>
        </div>
      </div>
      <nav class="subnav">
        <div class="subnav-group">
          <span class="subnav-label">Core</span>
          <a href="index.html" class="btn btn-secondary btn-sm">Catalog</a>
          <a href="admin.html" class="btn btn-secondary btn-sm">Admin</a>
          <a href="gallery.html" class="btn btn-secondary btn-sm">Gallery</a>
          <a href="reports.html" class="btn btn-secondary btn-sm">Reports</a>
          <a href="operations.html" class="btn btn-secondary btn-sm">Operations</a>
          <a href="about.html" class="btn btn-secondary btn-sm">About</a>
        </div>
        <details class="subnav-more" open>
          <summary class="btn btn-secondary btn-sm">More Tools</summary>
          <div class="subnav-group subnav-group-tools">
            <a href="studio.html" class="btn btn-secondary btn-sm">Studio</a>
            <a href="json-workbench.html" class="btn btn-secondary btn-sm">JSON Workbench</a>
            <a href="rule-engine.html" class="btn btn-secondary btn-sm">Rule Engine</a>
            <a href="dataset-joiner.html" class="btn btn-secondary btn-sm">Dataset Joiner</a>
            <a href="schema-studio.html" class="btn btn-secondary btn-sm is-active" aria-current="page">Schema Studio</a>
            <a href="insights-lab.html" class="btn btn-secondary btn-sm">Insights Lab</a>
            <a href="weather.html" class="btn btn-secondary btn-sm">Weather</a>
            <a href="markets.html" class="btn btn-secondary btn-sm">Markets</a>
            <a href="github-explorer.html" class="btn btn-secondary btn-sm">GitHub</a>
            <a href="countries.html" class="btn btn-secondary btn-sm">Countries</a>
            <a href="newsfeed.html" class="btn btn-secondary btn-sm">News</a>
          </div>
        </details>
      </nav>
    </div>
  </header>

  <div class="container">
    <div id="schema-message" class="message" style="display:none"></div>

    <section class="section">
      <div class="api-toolbar">
        <input id="schema-array-path" type="text" value="items" placeholder="Array path">
        <button id="schema-load" class="btn btn-primary" type="button">Load data.json</button>
        <button id="schema-infer" class="btn btn-secondary" type="button">Infer Schema</button>
        <button id="schema-validate" class="btn btn-success" type="button">Validate Against Schema</button>
      </div>
    </section>

    <section class="section">
      <div class="api-toolbar">
        <textarea id="schema-data" class="studio-textarea" rows="12" placeholder="Dataset JSON"></textarea>
        <textarea id="schema-rules" class="studio-textarea" rows="12" placeholder="Inferred schema"></textarea>
      </div>
      <pre id="schema-report" class="studio-list" style="margin-top:0.7rem; white-space:pre-wrap;"></pre>
    </section>
  </div>

  <script src="schema-studio.js"></script>
</body>
</html>
