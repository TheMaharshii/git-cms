<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Git-CMS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="scroll-progress" class="scroll-progress"></div>
  <header class="site-header">
    <div class="container">
      <div class="brand-row">
        <img src="assets/logo.svg" alt="Git-CMS Logo" class="brand-logo" width="44" height="44">
        <div>
          <h1>Git-CMS</h1>
          <p class="header-subtitle">Simple public catalog</p>
        </div>
      </div>
      <nav class="subnav">
        <a href="gallery.html" class="btn btn-secondary btn-sm">Gallery</a>
        <a href="reports.html" class="btn btn-secondary btn-sm">Reports</a>
        <a href="planner.html" class="btn btn-secondary btn-sm">Planner</a>
        <a href="studio.html" class="btn btn-secondary btn-sm">Studio</a>
        <a href="about.html" class="btn btn-secondary btn-sm">About</a>
      </nav>
    </div>
  </header>

  <div class="container">
    <!-- Error Message -->
    <div id="error-message" role="alert"></div>

    <!-- Loading State -->
    <div id="loading" class="loading-spinner">
      <div class="spinner"></div>
      <p>Loading products...</p>
    </div>

    <!-- Main Content (hidden while loading) -->
    <div id="main-content" style="display: none;">
      <!-- Controls Section -->
      <div class="section">
        <div class="top-controls">
          <!-- Search -->
          <div class="search-input-wrapper">
            <img src="assets/icon-search.svg" alt="Search" class="input-icon" width="18" height="18">
            <input
              type="text"
              id="search-input"
              placeholder="Search products..."
              aria-label="Search products"
            >
          </div>

          <!-- Category Filter -->
          <select id="category-filter" aria-label="Filter by category">
            <option value="all">All Categories</option>
          </select>

          <!-- Min Price -->
          <input
            type="number"
            id="min-price"
            placeholder="Min price"
            min="0"
            step="0.01"
            aria-label="Minimum price"
          >

          <!-- Max Price -->
          <input
            type="number"
            id="max-price"
            placeholder="Max price"
            min="0"
            step="0.01"
            aria-label="Maximum price"
          >

          <!-- Sort -->
          <select id="sort-select" aria-label="Sort by">
            <option value="name-asc">Name (A-Z)</option>
            <option value="name-desc">Name (Z-A)</option>
            <option value="price-asc">Price (Low-High)</option>
            <option value="price-desc">Price (High-Low)</option>
            <option value="random">Random</option>
          </select>

          <!-- Page Size -->
          <select id="page-size" aria-label="Items per page">
            <option value="6">6 / page</option>
            <option value="12" selected>12 / page</option>
            <option value="18">18 / page</option>
            <option value="24">24 / page</option>
          </select>

          <!-- View Toggle -->
          <select id="view-toggle" aria-label="View type">
            <option value="cards">Cards View</option>
            <option value="table">Table View</option>
          </select>

          <label class="inline-toggle" for="favorites-only">
            <input type="checkbox" id="favorites-only">
            Favorites only
          </label>

          <label class="inline-toggle" for="only-images">
            <input type="checkbox" id="only-images">
            With images
          </label>

          <select id="auto-refresh" aria-label="Auto refresh interval">
            <option value="0">Auto refresh: Off</option>
            <option value="30">Auto refresh: 30s</option>
            <option value="60">Auto refresh: 60s</option>
            <option value="120">Auto refresh: 120s</option>
          </select>

          <select id="view-presets" aria-label="Saved views">
            <option value="">Saved views</option>
          </select>

          <button id="save-view-btn" class="btn btn-secondary" type="button">Save View</button>
          <button id="delete-view-btn" class="btn btn-secondary" type="button">Delete View</button>

          <button id="clear-filters" class="btn btn-secondary" type="button">Clear</button>
          <button id="shuffle-btn" class="btn btn-secondary" type="button">Shuffle</button>
          <button id="random-pick-btn" class="btn btn-secondary" type="button">Random Pick</button>
          <button id="share-view-btn" class="btn btn-secondary" type="button">Share View</button>
          <button id="export-visible-btn" class="btn btn-secondary" type="button">Export Visible</button>

          <!-- Admin Link -->
          <a href="admin.html" class="btn btn-secondary">
            <img src="assets/icon-admin.svg" alt="Admin" class="icon-sm" width="16" height="16">
            Admin Panel
          </a>
        </div>
      </div>

      <div class="section">
        <div class="summary-bar" id="summary-bar">
          <div id="results-summary">0 results</div>
          <div id="catalog-meta">Ready</div>
        </div>
      </div>

      <div class="section">
        <div id="category-chips" class="chips-row" aria-label="Quick category chips"></div>
      </div>

      <!-- Items Container -->
      <div class="section">
        <div id="items-container" class="items-grid">
          <!-- Items populated dynamically -->
        </div>
      </div>

      <div class="section">
        <div id="pagination" class="pagination" aria-label="Pagination controls"></div>
      </div>

      <div class="section">
        <div class="section-header-inline">
          <h2 class="section-title">Recently Viewed</h2>
          <button id="clear-recent-btn" class="btn btn-secondary btn-sm" type="button">Clear Recent</button>
        </div>
        <div id="recently-viewed" class="recent-grid">
          <p class="empty-state">No recently viewed items</p>
        </div>
      </div>
    </div>
  </div>

  <button id="back-to-top" class="back-to-top" type="button" aria-label="Back to top">↑</button>

  <!-- Scripts -->
  <script src="app.js"></script>
</body>
</html>
