<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Git-CMS | Picsum Gallery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <div class="brand-row">
        <img src="assets/logo.svg" alt="Git-CMS Logo" class="brand-logo" width="44" height="44">
        <div>
          <h1>Picsum Gallery</h1>
          <p class="header-subtitle">Pinterest-style masonry feed with local cache</p>
        </div>
      </div>
      <nav class="subnav">
        <a href="index.html" class="btn btn-secondary btn-sm">Catalog</a>
        <a href="admin.html" class="btn btn-secondary btn-sm">Admin</a>
        <a href="reports.html" class="btn btn-secondary btn-sm">Reports</a>
        <a href="planner.html" class="btn btn-secondary btn-sm">Planner</a>
        <a href="studio.html" class="btn btn-secondary btn-sm">Studio</a>
        <a href="weather.html" class="btn btn-secondary btn-sm">Weather</a>
        <a href="markets.html" class="btn btn-secondary btn-sm">Markets</a>
        <a href="github-explorer.html" class="btn btn-secondary btn-sm">GitHub</a>
        <a href="countries.html" class="btn btn-secondary btn-sm">Countries</a>
        <a href="newsfeed.html" class="btn btn-secondary btn-sm">News</a>
        <a href="about.html" class="btn btn-secondary btn-sm">About</a>
      </nav>
    </div>
  </header>

  <div class="container">
    <div id="gallery-error" class="message message-error" style="display:none"></div>

    <section class="section">
      <div class="gallery-controls">
        <input id="gallery-search" type="text" placeholder="Filter by author..." aria-label="Filter by author">
        <div class="gallery-fixed-columns">Layout: 4 columns</div>
        <button id="refresh-gallery" class="btn btn-secondary" type="button">Refresh API</button>
        <button id="clear-gallery-cache" class="btn btn-secondary" type="button">Clear Cache</button>
      </div>
      <div id="gallery-meta" class="admin-summary">Ready</div>
    </section>

    <section class="section">
      <div id="gallery-masonry" class="gallery-masonry" aria-live="polite"></div>
    </section>

    <section class="section text-center">
      <button id="load-more-gallery" class="btn btn-primary" type="button">Load More</button>
    </section>
  </div>

  <div id="gallery-lightbox" class="gallery-lightbox" hidden>
    <button id="gallery-lightbox-close" class="btn btn-secondary btn-sm" type="button">Close</button>
    <img id="gallery-lightbox-image" alt="Selected photo">
    <p id="gallery-lightbox-caption"></p>
    <div class="gallery-lightbox-details" id="gallery-lightbox-details"></div>
  </div>

  <script src="gallery.js"></script>
</body>
</html>
