<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Git-CMS | Catalog Reports</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <div class="brand-row">
        <img src="assets/logo.svg" alt="Git-CMS Logo" class="brand-logo" width="44" height="44">
        <div>
          <h1>Catalog Reports</h1>
          <p class="header-subtitle">Visual insights from data.json</p>
        </div>
      </div>
      <nav class="subnav">
        <a href="index.html" class="btn btn-secondary btn-sm">Catalog</a>
        <a href="gallery.html" class="btn btn-secondary btn-sm">Gallery</a>
        <a href="planner.html" class="btn btn-secondary btn-sm">Planner</a>
        <a href="studio.html" class="btn btn-secondary btn-sm">Studio</a>
      </nav>
    </div>
  </header>

  <div class="container">
    <div id="reports-message" class="message message-error" style="display:none"></div>

    <section class="section">
      <div class="admin-stats-grid">
        <div class="admin-stat-card"><span>Total Items</span><strong id="r-total">0</strong></div>
        <div class="admin-stat-card"><span>Categories</span><strong id="r-categories">0</strong></div>
        <div class="admin-stat-card"><span>Average Price</span><strong id="r-avg">$0.00</strong></div>
        <div class="admin-stat-card"><span>Median Price</span><strong id="r-median">$0.00</strong></div>
        <div class="admin-stat-card"><span>Min Price</span><strong id="r-min">$0.00</strong></div>
        <div class="admin-stat-card"><span>Max Price</span><strong id="r-max">$0.00</strong></div>
      </div>
    </section>

    <section class="section">
      <h2 class="section-title">Category Distribution</h2>
      <canvas id="category-chart" class="reports-canvas" width="1000" height="380"></canvas>
    </section>

    <section class="section">
      <h2 class="section-title">Price Histogram</h2>
      <canvas id="price-chart" class="reports-canvas" width="1000" height="380"></canvas>
    </section>

    <section class="section">
      <h2 class="section-title">Top Products by Price</h2>
      <div id="top-products" class="items-grid"></div>
    </section>
  </div>

  <script src="reports.js"></script>
</body>
</html>
