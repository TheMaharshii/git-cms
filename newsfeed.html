<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Git-CMS | Tech News Feed</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <div class="brand-row">
        <img src="assets/logo.svg" alt="Git-CMS Logo" class="brand-logo" width="44" height="44">
        <div>
          <h1>Tech News Feed</h1>
          <p class="header-subtitle">Hacker News search feed via Algolia API</p>
        </div>
      </div>
      <nav class="subnav">
        <a href="index.html" class="btn btn-secondary btn-sm">Catalog</a>
        <a href="admin.html" class="btn btn-secondary btn-sm">Admin</a>
        <a href="gallery.html" class="btn btn-secondary btn-sm">Gallery</a>
        <a href="reports.html" class="btn btn-secondary btn-sm">Reports</a>
        <a href="planner.html" class="btn btn-secondary btn-sm">Planner</a>
        <a href="studio.html" class="btn btn-secondary btn-sm">Studio</a>
        <a href="weather.html" class="btn btn-secondary btn-sm">Weather</a>
        <a href="markets.html" class="btn btn-secondary btn-sm">Markets</a>
        <a href="github-explorer.html" class="btn btn-secondary btn-sm">GitHub</a>
        <a href="countries.html" class="btn btn-secondary btn-sm">Countries</a>
        <a href="newsfeed.html" class="btn btn-secondary btn-sm">News</a>
        <a href="about.html" class="btn btn-secondary btn-sm">About</a>
      </nav>
    </div>
  </header>

  <div class="container">
    <div id="news-error" class="message message-error" style="display:none"></div>

    <section class="section">
      <div class="api-toolbar">
        <input id="news-query" type="text" placeholder="Search tech topics (e.g. ai, rust, react)">
        <button id="news-search" class="btn btn-primary" type="button">Search</button>
      </div>
      <div id="news-meta" class="admin-summary">Ready</div>
    </section>

    <section class="section">
      <div id="news-list" class="api-grid"></div>
    </section>

    <section class="section text-center">
      <button id="news-load-more" class="btn btn-secondary" type="button">Load More</button>
    </section>
  </div>

  <script src="newsfeed.js"></script>
</body>
</html>
