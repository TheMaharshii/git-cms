<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Git-CMS | Weather Hub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <div class="brand-row">
        <img src="assets/logo.svg" alt="Git-CMS Logo" class="brand-logo" width="44" height="44">
        <div>
          <h1>Weather Hub</h1>
          <p class="header-subtitle">Live weather + 7-day forecast via Open-Meteo</p>
        </div>
      </div>
      <nav class="subnav">
        <div class="subnav-group">
          <span class="subnav-label">Core</span>
          <a href="index.html" class="btn btn-secondary btn-sm">Catalog</a>
          <a href="admin.html" class="btn btn-secondary btn-sm">Admin</a>
          <a href="gallery.html" class="btn btn-secondary btn-sm">Gallery</a>
          <a href="reports.html" class="btn btn-secondary btn-sm">Reports</a>
          <a href="planner.html" class="btn btn-secondary btn-sm">Planner</a>
          <a href="about.html" class="btn btn-secondary btn-sm">About</a>
        </div>
        <details class="subnav-more" open>
          <summary class="btn btn-secondary btn-sm">More Tools</summary>
          <div class="subnav-group subnav-group-tools">
            <a href="studio.html" class="btn btn-secondary btn-sm">Studio</a>
            <a href="weather.html" class="btn btn-secondary btn-sm is-active" aria-current="page">Weather</a>
            <a href="markets.html" class="btn btn-secondary btn-sm">Markets</a>
            <a href="github-explorer.html" class="btn btn-secondary btn-sm">GitHub</a>
            <a href="countries.html" class="btn btn-secondary btn-sm">Countries</a>
            <a href="newsfeed.html" class="btn btn-secondary btn-sm">News</a>
          </div>
        </details>
      </nav>
    </div>
  </header>

  <div class="container">
    <div id="weather-error" class="message message-error" style="display:none"></div>

    <section class="section">
      <div class="api-toolbar">
        <input id="weather-city" type="text" placeholder="Search city (e.g. London)">
        <button id="weather-search" class="btn btn-primary" type="button">Search</button>
        <button id="weather-locate" class="btn btn-secondary" type="button">Use Browser Location</button>
      </div>
      <div id="weather-meta" class="admin-summary">Ready</div>
    </section>

    <section class="section">
      <div id="weather-current" class="metric-grid"></div>
    </section>

    <section class="section">
      <h2 class="section-title">7 Day Forecast</h2>
      <div id="weather-forecast" class="api-grid"></div>
    </section>
  </div>

  <script src="weather.js"></script>
</body>
</html>
